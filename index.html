<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0a0f1e">
    <title>Neon Runner - Endless Adventure</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #0a0f1e 0%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', -apple-system, BlinkMacSystemFont, sans-serif;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }

        .game-wrapper {
            position: relative;
            border-radius: 0;
            box-shadow: 0 0 0 3px rgba(0, 255, 255, 0.3), 0 20px 40px rgba(0, 0, 0, 0.5);
            background: #000;
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%;
            height: auto;
            cursor: pointer;
            touch-action: none;
        }

        /* Modern UI Overlay */
        .ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            pointer-events: none;
            z-index: 10;
            background: linear-gradient(180deg, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0) 100%);
        }

        .stats-container {
            display: flex;
            gap: 20px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 60px;
            border: 1px solid rgba(0, 255, 255, 0.3);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .stat-card {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: bold;
            color: white;
            text-shadow: 0 0 8px rgba(0,0,0,0.5);
        }

        .stat-icon {
            font-size: 1.4rem;
            filter: drop-shadow(0 0 3px currentColor);
        }

        .stat-value {
            font-size: 1.3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #ffd700);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .coin-stat .stat-value {
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            -webkit-background-clip: text;
            background-clip: text;
        }

        .score-stat .stat-value {
            background: linear-gradient(135deg, #4caf50, #00e676);
            -webkit-background-clip: text;
            background-clip: text;
        }

        /* Powerup Indicators */
        .powerup-indicators {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: center;
            gap: 15px;
            pointer-events: none;
            z-index: 10;
        }

        .powerup-badge {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(12px);
            padding: 8px 18px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: bold;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
        }

        .powerup-badge.active {
            border-color: #00e5ff;
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.5);
            background: linear-gradient(135deg, rgba(0, 229, 255, 0.2), rgba(0, 100, 255, 0.2));
        }

        .powerup-timer {
            font-family: monospace;
            font-size: 1rem;
            font-weight: bold;
            color: #00e5ff;
        }

        /* Game Over Panel */
        .gameover-panel {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(20px);
            padding: 30px 40px;
            border-radius: 40px;
            text-align: center;
            border: 2px solid rgba(0, 255, 255, 0.6);
            display: none;
            flex-direction: column;
            gap: 20px;
            z-index: 20;
            min-width: 280px;
            pointer-events: auto;
            animation: slideIn 0.4s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.9);
            }
            to {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
        }

        .gameover-panel h2 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #ff3366, #ff6b6b);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .gameover-stats {
            display: flex;
            justify-content: space-between;
            gap: 30px;
            margin: 10px 0;
        }

        .gameover-stat {
            text-align: center;
        }

        .gameover-stat .label {
            color: #aaa;
            font-size: 0.8rem;
        }

        .gameover-stat .value {
            color: #ffd700;
            font-size: 1.8rem;
            font-weight: bold;
        }

        .restart-btn {
            background: linear-gradient(135deg, #00e5ff, #0099ff);
            border: none;
            padding: 14px 35px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s;
            color: white;
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(0, 229, 255, 0.3);
        }

        .restart-btn:active {
            transform: scale(0.96);
        }

        /* Jump Button for Mobile */
        .jump-button {
            position: absolute;
            bottom: 100px;
            right: 20px;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(0, 229, 255, 0.9), rgba(0, 100, 255, 0.9));
            border: 2px solid rgba(255, 255, 255, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: white;
            cursor: pointer;
            pointer-events: auto;
            z-index: 15;
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.5);
            backdrop-filter: blur(5px);
            transition: all 0.1s ease;
            touch-action: manipulation;
        }

        .jump-button:active {
            transform: scale(0.92);
            background: linear-gradient(135deg, #00ffaa, #00ccff);
        }

        @media (max-width: 768px) {
            .stats-container {
                padding: 6px 15px;
                gap: 12px;
            }
            .stat-icon {
                font-size: 1rem;
            }
            .stat-value {
                font-size: 1rem;
            }
            .powerup-badge {
                padding: 5px 12px;
                font-size: 0.7rem;
            }
            .jump-button {
                width: 60px;
                height: 60px;
                bottom: 80px;
                right: 15px;
                font-size: 1.8rem;
            }
        }

        @media (max-width: 480px) {
            .jump-button {
                width: 55px;
                height: 55px;
                bottom: 70px;
                right: 12px;
            }
        }

        .instruction {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            padding: 5px 12px;
            border-radius: 20px;
            color: #ccc;
            font-size: 0.7rem;
            pointer-events: none;
            font-family: monospace;
        }
    </style>
</head>
<body>
<div class="game-wrapper">
    <canvas id="gameCanvas"></canvas>
    
    <div class="ui-overlay">
        <div class="stats-container">
            <div class="stat-card coin-stat">
                <span class="stat-icon">💰</span>
                <span class="stat-value" id="coinCount">0</span>
            </div>
            <div class="stat-card score-stat">
                <span class="stat-icon">⭐</span>
                <span class="stat-value" id="scoreCount">0</span>
            </div>
        </div>
    </div>

    <div class="powerup-indicators">
        <div class="powerup-badge" id="magneticBadge">
            <span>🧲</span>
            <span>MAGNET</span>
            <span class="powerup-timer" id="magneticTimer">0</span>
        </div>
        <div class="powerup-badge" id="shieldBadge">
            <span>🛡️</span>
            <span>SHIELD</span>
            <span class="powerup-timer" id="shieldTimer">0</span>
        </div>
    </div>

    <div class="jump-button" id="jumpButton">
        ⬆️
    </div>

    <div class="gameover-panel" id="gameoverPanel">
        <h2>GAME OVER</h2>
        <div class="gameover-stats">
            <div class="gameover-stat">
                <div class="label">FINAL SCORE</div>
                <div class="value" id="finalScore">0</div>
            </div>
            <div class="gameover-stat">
                <div class="label">COINS</div>
                <div class="value" id="finalCoins">0</div>
            </div>
        </div>
        <button class="restart-btn" id="restartBtn">PLAY AGAIN 🚀</button>
    </div>
    
    <div class="instruction">
        👆 TAP / CLICK TO JUMP
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    // Responsive canvas sizing
    function resizeCanvas() {
        const container = canvas.parentElement;
        const maxWidth = Math.min(window.innerWidth, 500);
        const maxHeight = window.innerHeight * 0.85;
        
        canvas.width = 400;
        canvas.height = 600;
        
        canvas.style.width = `${Math.min(maxWidth, 400)}px`;
        canvas.style.height = 'auto';
    }
    
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);
    
    // Game constants
    const GAME_WIDTH = 400;
    const GAME_HEIGHT = 600;
    const GROUND_Y = 500;
    
    // Game state
    let gameRunning = true;
    let score = 0;
    let coins = 0;
    let frame = 0;
    let speed = 4;
    let baseSpeed = 4;
    
    // Powerups
    let magneticActive = false;
    let magneticTimer = 0;
    let shieldActive = false;
    let shieldTimer = 0;
    
    // Player (Runner)
    const player = {
        x: GAME_WIDTH / 2 - 15,
        y: GROUND_Y - 45,
        width: 30,
        height: 45,
        velocityY: 0,
        isJumping: false,
        gravity: 0.7,
        jumpPower: -11,
        color: '#ff6b6b',
        runCycle: 0
    };
    
    // Game objects with perspective effect (closer to player)
    let lanes = [];
    let obstacles = [];
    let coinsList = [];
    let powerupsList = [];
    let particles = [];
    let backgroundStars = [];
    
    // Initialize stars
    for (let i = 0; i < 150; i++) {
        backgroundStars.push({
            x: Math.random() * GAME_WIDTH,
            y: Math.random() * GAME_HEIGHT,
            size: Math.random() * 2 + 1,
            alpha: Math.random() * 0.5 + 0.3
        });
    }
    
    // Create lane markers
    for (let i = 0; i < 20; i++) {
        lanes.push({
            y: i * 40,
            offset: 0
        });
    }
    
    // Object types
    const obstacleTypes = [
        { width: 28, height: 38, color: '#e74c3c', colorLight: '#ff6b6b' },
        { width: 30, height: 42, color: '#c0392b', colorLight: '#e74c3c' },
        { width: 25, height: 40, color: '#d35400', colorLight: '#e67e22' }
    ];
    
    const powerupTypes = [
        { type: 'magnetic', color: '#9b59b6', colorLight: '#c0392b', symbol: '🧲', duration: 300 },
        { type: 'shield', color: '#3498db', colorLight: '#5dade2', symbol: '🛡️', duration: 300 }
    ];
    
    // Jump cooldown
    let canJump = true;
    let jumpCooldown = 0;
    
    // Visual effects
    let trail = [];
    let screenShake = 0;
    let scoreMultiplier = 1;
    
    function init() {
        gameRunning = true;
        score = 0;
        coins = 0;
        speed = baseSpeed;
        frame = 0;
        magneticActive = false;
        magneticTimer = 0;
        shieldActive = false;
        shieldTimer = 0;
        obstacles = [];
        coinsList = [];
        powerupsList = [];
        particles = [];
        trail = [];
        player.y = GROUND_Y - player.height;
        player.velocityY = 0;
        player.isJumping = false;
        canJump = true;
        jumpCooldown = 0;
        scoreMultiplier = 1;
        updateUI();
        document.getElementById('gameoverPanel').style.display = 'none';
    }
    
    function updateUI() {
        document.getElementById('coinCount').textContent = Math.floor(coins);
        document.getElementById('scoreCount').textContent = Math.floor(score);
        
        const magneticBadge = document.getElementById('magneticBadge');
        const shieldBadge = document.getElementById('shieldBadge');
        const magneticTimerEl = document.getElementById('magneticTimer');
        const shieldTimerEl = document.getElementById('shieldTimer');
        
        if (magneticActive) {
            magneticBadge.classList.add('active');
            magneticTimerEl.textContent = Math.ceil(magneticTimer / 60);
        } else {
            magneticBadge.classList.remove('active');
            magneticTimerEl.textContent = '0';
        }
        
        if (shieldActive) {
            shieldBadge.classList.add('active');
            shieldTimerEl.textContent = Math.ceil(shieldTimer / 60);
        } else {
            shieldBadge.classList.remove('active');
            shieldTimerEl.textContent = '0';
        }
    }
    
    function spawnObstacle() {
        const type = obstacleTypes[Math.floor(Math.random() * obstacleTypes.length)];
        obstacles.push({
            x: GAME_WIDTH,
            y: GROUND_Y - type.height,
            width: type.width,
            height: type.height,
            color: type.color,
            colorLight: type.colorLight,
            rotation: 0
        });
    }
    
    function spawnCoin() {
        coinsList.push({
            x: GAME_WIDTH,
            y: GROUND_Y - 35 - Math.random() * 40,
            width: 12,
            height: 12,
            angle: 0,
            scale: 1
        });
    }
    
    function spawnPowerup() {
        const type = powerupTypes[Math.floor(Math.random() * powerupTypes.length)];
        powerupsList.push({
            x: GAME_WIDTH,
            y: GROUND_Y - 40 - Math.random() * 30,
            width: 22,
            height: 22,
            color: type.color,
            colorLight: type.colorLight,
            type: type.type,
            symbol: type.symbol,
            duration: type.duration,
            floatOffset: 0
        });
    }
    
    function createParticles(x, y, color, count = 8) {
        for (let i = 0; i < count; i++) {
            particles.push({
                x: x,
                y: y,
                vx: (Math.random() - 0.5) * 5,
                vy: (Math.random() - 0.5) * 5 - 2,
                life: 1,
                color: color,
                size: Math.random() * 4 + 2,
                gravity: 0.2
            });
        }
    }
    
    function updateParticles() {
        for (let i = particles.length - 1; i >= 0; i--) {
            particles[i].x += particles[i].vx;
            particles[i].y += particles[i].vy;
            particles[i].vy += particles[i].gravity;
            particles[i].life -= 0.02;
            if (particles[i].life <= 0 || particles[i].y > GAME_HEIGHT) {
                particles.splice(i, 1);
            }
        }
    }
    
    function updateTrail() {
        trail.unshift({ x: player.x + player.width/2, y: player.y + player.height/2 });
        if (trail.length > 8) trail.pop();
    }
    
    function checkCollision(rect1, rect2) {
        return rect1.x < rect2.x + rect2.width &&
               rect1.x + rect1.width > rect2.x &&
               rect1.y < rect2.y + rect2.height &&
               rect1.y + rect1.height > rect2.y;
    }
    
    function update() {
        if (!gameRunning) return;
        
        frame++;
        
        if (jumpCooldown > 0) jumpCooldown--;
        
        // Update powerups
        if (magneticActive) {
            magneticTimer--;
            if (magneticTimer <= 0) magneticActive = false;
        }
        if (shieldActive) {
            shieldTimer--;
            if (shieldTimer <= 0) shieldActive = false;
        }
        
        // Player physics
        player.velocityY += player.gravity;
        player.y += player.velocityY;
        
        if (player.y >= GROUND_Y - player.height) {
            player.y = GROUND_Y - player.height;
            player.velocityY = 0;
            player.isJumping = false;
            canJump = true;
        }
        
        if (player.y < 0) player.y = 0;
        
        // Update speed and multiplier
        speed = baseSpeed + Math.floor(score / 800);
        if (speed > 10) speed = 10;
        
        scoreMultiplier = 1 + Math.floor(score / 2000);
        
        // Spawn objects
        if (frame % Math.max(45, 65 - Math.floor(score / 300)) === 0) {
            spawnObstacle();
        }
        
        if (frame % Math.max(20, 30 - Math.floor(score / 400)) === 0) {
            spawnCoin();
        }
        
        if (frame % 150 === 0 && powerupsList.length < 2) {
            spawnPowerup();
        }
        
        // Update obstacles
        for (let i = 0; i < obstacles.length; i++) {
            obstacles[i].x -= speed;
            obstacles[i].rotation += 0.05;
            if (obstacles[i].x + obstacles[i].width < 0) {
                obstacles.splice(i, 1);
                i--;
            }
        }
        
        // Update coins with magnetic effect
        for (let i = 0; i < coinsList.length; i++) {
            if (magneticActive) {
                const dx = (player.x + player.width/2) - (coinsList[i].x + 6);
                const dy = (player.y + player.height/2) - (coinsList[i].y + 6);
                const dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < 120) {
                    const angle = Math.atan2(dy, dx);
                    coinsList[i].x += Math.cos(angle) * 6;
                    coinsList[i].y += Math.sin(angle) * 6;
                } else {
                    coinsList[i].x -= speed;
                }
            } else {
                coinsList[i].x -= speed;
            }
            coinsList[i].angle += 0.1;
            if (coinsList[i].x + 12 < 0) {
                coinsList.splice(i, 1);
                i--;
            }
        }
        
        // Update powerups
        for (let i = 0; i < powerupsList.length; i++) {
            powerupsList[i].x -= speed;
            powerupsList[i].floatOffset = Math.sin(Date.now() * 0.008 + i) * 3;
            if (powerupsList[i].x + 22 < 0) {
                powerupsList.splice(i, 1);
                i--;
            }
        }
        
        // Collision detection
        const playerRect = { x: player.x, y: player.y, width: player.width, height: player.height };
        
        // Coin collection
        for (let i = 0; i < coinsList.length; i++) {
            const coinRect = { x: coinsList[i].x, y: coinsList[i].y, width: 12, height: 12 };
            if (checkCollision(playerRect, coinRect)) {
                coins++;
                score += 15 * scoreMultiplier;
                createParticles(coinsList[i].x + 6, coinsList[i].y + 6, '#ffd700', 6);
                coinsList.splice(i, 1);
                i--;
                updateUI();
            }
        }
        
        // Powerup collection
        for (let i = 0; i < powerupsList.length; i++) {
            const powerRect = { x: powerupsList[i].x, y: powerupsList[i].y, width: 22, height: 22 };
            if (checkCollision(playerRect, powerRect)) {
                if (powerupsList[i].type === 'magnetic') {
                    magneticActive = true;
                    magneticTimer = powerupsList[i].duration;
                    createParticles(powerupsList[i].x + 11, powerupsList[i].y + 11, '#9b59b6', 12);
                } else if (powerupsList[i].type === 'shield') {
                    shieldActive = true;
                    shieldTimer = powerupsList[i].duration;
                    createParticles(powerupsList[i].x + 11, powerupsList[i].y + 11, '#3498db', 12);
                }
                powerupsList.splice(i, 1);
                i--;
                updateUI();
            }
        }
        
        // Obstacle collision
        for (let i = 0; i < obstacles.length; i++) {
            const obstacleRect = { x: obstacles[i].x, y: obstacles[i].y, width: obstacles[i].width, height: obstacles[i].height };
            if (checkCollision(playerRect, obstacleRect)) {
                if (shieldActive) {
                    createParticles(obstacles[i].x + obstacles[i].width/2, obstacles[i].y + obstacles[i].height/2, '#ffaa44', 10);
                    obstacles.splice(i, 1);
                    i--;
                    screenShake = 8;
                } else {
                    gameRunning = false;
                    document.getElementById('finalScore').textContent = Math.floor(score);
                    document.getElementById('finalCoins').textContent = Math.floor(coins);
                    document.getElementById('gameoverPanel').style.display = 'flex';
                    return;
                }
            }
        }
        
        // Update score
        score += 0.3 * scoreMultiplier;
        updateUI();
        
        // Update effects
        updateParticles();
        updateTrail();
        
        if (screenShake > 0) screenShake--;
        
        // Animate player run cycle
        player.runCycle = (player.runCycle + 0.2) % (Math.PI * 2);
    }
    
    function drawStarBackground() {
        for (const star of backgroundStars) {
            ctx.globalAlpha = star.alpha + Math.sin(Date.now() * 0.001 + star.x) * 0.1;
            ctx.fillStyle = `rgba(255, 255, 255, ${star.alpha})`;
            ctx.fillRect(star.x, star.y, star.size, star.size);
        }
        ctx.globalAlpha = 1;
    }
    
    function drawGround() {
        // Ground gradient
        const grad = ctx.createLinearGradient(0, GROUND_Y - 20, 0, GAME_HEIGHT);
        grad.addColorStop(0, '#2c3e2f');
        grad.addColorStop(1, '#1e2a1e');
        ctx.fillStyle = grad;
        ctx.fillRect(0, GROUND_Y - 20, GAME_WIDTH, GAME_HEIGHT - GROUND_Y + 20);
        
        // Ground line
        ctx.strokeStyle = '#4caf50';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(0, GROUND_Y);
        ctx.lineTo(GAME_WIDTH, GROUND_Y);
        ctx.stroke();
        
        // Lane markers
        ctx.fillStyle = '#5a6e5a';
        for (let i = 0; i < lanes.length; i++) {
            const laneY = (lanes[i].y + frame * 2) % (GAME_HEIGHT);
            if (laneY > GROUND_Y && laneY < GAME_HEIGHT) {
                ctx.fillRect(GAME_WIDTH/2 - 2, laneY, 4, 15);
            }
        }
    }
    
    function drawObstacles() {
        for (const obs of obstacles) {
            ctx.save();
            ctx.translate(obs.x + obs.width/2, obs.y + obs.height/2);
            ctx.rotate(obs.rotation);
            const grad = ctx.createLinearGradient(-obs.width/2, -obs.height/2, obs.width/2, obs.height/2);
            grad.addColorStop(0, obs.color);
            grad.addColorStop(1, obs.colorLight);
            ctx.fillStyle = grad;
            ctx.fillRect(-obs.width/2, -obs.height/2, obs.width, obs.height);
            ctx.restore();
            
            // Add highlights
            ctx.fillStyle = 'rgba(255,255,255,0.3)';
            ctx.fillRect(obs.x + 5, obs.y + 5, obs.width - 10, 5);
        }
    }
    
    function drawCoins() {
        for (const coin of coinsList) {
            ctx.save();
            ctx.translate(coin.x + 6, coin.y + 6);
            ctx.rotate(coin.angle);
            ctx.shadowBlur = 8;
            ctx.shadowColor = '#ffd700';
            const grad = ctx.createLinearGradient(-6, -6, 6, 6);
            grad.addColorStop(0, '#ffd700');
            grad.addColorStop(1, '#ffaa00');
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.ellipse(0, 0, 6, 6, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#ff8800';
            ctx.beginPath();
            ctx.ellipse(0, 0, 3, 3, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }
    }
    
    function drawPowerups() {
        for (const power of powerupsList) {
            ctx.save();
            ctx.translate(power.x + 11, power.y + 11 + power.floatOffset);
            ctx.shadowBlur = 12;
            ctx.shadowColor = power.color;
            const grad = ctx.createLinearGradient(-11, -11, 11, 11);
            grad.addColorStop(0, power.color);
            grad.addColorStop(1, power.colorLight);
            ctx.fillStyle = grad;
            ctx.fillRect(-11, -11, 22, 22);
            ctx.font = '18px Arial';
            ctx.fillStyle = 'white';
            ctx.shadowBlur = 3;
            ctx.fillText(power.symbol, -8, 7);
            ctx.restore();
        }
    }
    
    function drawPlayer() {
        // Trail effect
        for (let i = 0; i < trail.length; i++) {
            ctx.globalAlpha = 0.3 * (1 - i / trail.length);
            ctx.fillStyle = `rgba(255, 107, 107, ${0.3 - i * 0.03})`;
            ctx.beginPath();
            ctx.ellipse(trail[i].x, trail[i].y, 12, 15, 0, 0, Math.PI * 2);
            ctx.fill();
        }
        ctx.globalAlpha = 1;
        
        // Shield effect
        if (shieldActive) {
            ctx.save();
            ctx.shadowBlur = 20;
            ctx.shadowColor = '#00e5ff';
            ctx.beginPath();
            ctx.ellipse(player.x + player.width/2, player.y + player.height/2, player.width/2 + 12, player.height/2 + 8, 0, 0, Math.PI * 2);
            ctx.strokeStyle = '#00e5ff';
            ctx.lineWidth = 3;
            ctx.stroke();
            ctx.beginPath();
            ctx.ellipse(player.x + player.width/2, player.y + player.height/2, player.width/2 + 18, player.height/2 + 12, 0, 0, Math.PI * 2);
            ctx.stroke();
            ctx.restore();
        }
        
        // Player body with run animation
        const legOffset = Math.sin(player.runCycle) * 5;
        ctx.fillStyle = player.color;
        ctx.shadowBlur = 10;
        ctx.shadowColor = 'rgba(0,0,0,0.5)';
        ctx.fillRect(player.x, player.y, player.width, player.height);
        
        // Face
        ctx.fillStyle = 'white';
        ctx.fillRect(player.x + 20, player.y + 12, 6, 6);
        ctx.fillRect(player.x + 8, player.y + 12, 6, 6);
        ctx.fillStyle = '#2c3e50';
        ctx.fillRect(player.x + 21, player.y + 14, 3, 3);
        ctx.fillRect(player.x + 9, player.y + 14, 3, 3);
        
        // Legs animation
        ctx.fillStyle = '#ff8c69';
        ctx.fillRect(player.x + 5, player.y + player.height - 5, 7, 8);
        ctx.fillRect(player.x + 18, player.y + player.height - 5, 7, 8);
        
        ctx.fillStyle = '#e65c5c';
        ctx.fillRect(player.x + 5 + legOffset/2, player.y + player.height - 2, 7, 5);
        ctx.fillRect(player.x + 18 - legOffset/2, player.y + player.height - 2, 7, 5);
        
        ctx.shadowBlur = 0;
    }
    
    function drawParticles() {
        for (const p of particles) {
            ctx.globalAlpha = p.life;
            ctx.fillStyle = p.color;
            ctx.fillRect(p.x, p.y, p.size, p.size);
        }
        ctx.globalAlpha = 1;
    }
    
    function drawMagneticField() {
        if (magneticActive) {
            ctx.globalAlpha = 0.2;
            ctx.beginPath();
            ctx.ellipse(player.x + player.width/2, player.y + player.height/2, 90, 90, 0, 0, Math.PI * 2);
            ctx.fillStyle = '#9b59b6';
            ctx.fill();
            ctx.globalAlpha = 0.1;
            ctx.beginPath();
            ctx.ellipse(player.x + player.width/2, player.y + player.height/2, 130, 130, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.globalAlpha = 1;
        }
    }
    
    function draw() {
        ctx.clearRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
        
        ctx.save();
        if (screenShake > 0) {
            ctx.translate((Math.random() - 0.5) * screenShake, (Math.random() - 0.5) * screenShake);
        }
        
        // Sky gradient
        const skyGrad = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
        skyGrad.addColorStop(0, '#0f2027');
        skyGrad.addColorStop(1, '#203a43');
        ctx.fillStyle = skyGrad;
        ctx.fillRect(0, 0, GAME_WIDTH, GROUND_Y);
        
        drawStarBackground();
        drawGround();
        drawObstacles();
        drawCoins();
        drawPowerups();
        drawMagneticField();
        drawPlayer();
        drawParticles();
        
        // Draw active powerup timers text
        if (magneticActive) {
            ctx.font = 'bold 14px monospace';
            ctx.fillStyle = '#9b59b6';
            ctx.shadowBlur = 0;
            ctx.fillText(`MAGNETIC ${Math.ceil(magneticTimer / 60)}s`, GAME_WIDTH - 95, 50);
        }
        if (shieldActive) {
            ctx.font = 'bold 14px monospace';
            ctx.fillStyle = '#00e5ff';
            ctx.fillText(`SHIELD ${Math.ceil(shieldTimer / 60)}s`, GAME_WIDTH - 95, 80);
        }
        
        // Score multiplier
        if (scoreMultiplier > 1) {
            ctx.font = 'bold 12px monospace';
            ctx.fillStyle = '#ffd700';
            ctx.fillText(`x${scoreMultiplier} COMBO`, GAME_WIDTH - 70, 110);
        }
        
        ctx.restore();
    }
    
    function jump() {
        if (!gameRunning) return;
        if (!player.isJumping && canJump && jumpCooldown === 0) {
            player.velocityY = player.jumpPower;
            player.isJumping = true;
            canJump = false;
            jumpCooldown = 12;
            createParticles(player.x + player.width/2, player.y + player.height, '#ffffff', 5);
        }
    }
    
    // Event listeners
    canvas.addEventListener('click', (e) => {
        e.preventDefault();
        jump();
    });
    
    canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        jump();
    });
    
    document.getElementById('jumpButton').addEventListener('click', (e) => {
        e.stopPropagation();
        jump();
    });
    
    document.getElementById('jumpButton').addEventListener('touchstart', (e) => {
        e.preventDefault();
        e.stopPropagation();
        jump();
    });
    
    document.addEventListener('keydown', (e) => {
        if (e.code === 'Space' || e.code === 'ArrowUp') {
            e.preventDefault();
            jump();
        }
    });
    
    document.getElementById('restartBtn').addEventListener('click', () => {
        init();
        gameRunning = true;
    });
    
    // Start game
    init();
    
    // Game loop
    function gameLoop() {
        update();
        draw();
        requestAnimationFrame(gameLoop);
    }
    
    gameLoop();
</script>
</body>
    </html>
