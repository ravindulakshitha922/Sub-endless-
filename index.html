<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SUBWAY LEGENDS - 4K Endless Runner</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            touch-action: pan-x pan-y;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }

        #gameWrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
            max-width: 450px;
            max-height: 100vh;
            overflow: hidden;
            background: #020617;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
            border-radius: 0;
            margin: 0 auto;
        }

        #gameCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100% !important;
            height: 100% !important;
            display: block;
            image-rendering: crisp-edges;
            image-rendering: -moz-crisp-edges;
            image-rendering: -webkit-optimize-contrast;
            touch-action: none;
            z-index: 1;
        }

        #uiOverlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
            color: white;
            padding: 20px 16px 30px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            background: radial-gradient(circle at 50% 0%, rgba(0,200,255,0.15) 0%, transparent 70%);
        }

        .topBar {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            width: 100%;
            pointer-events: auto;
        }

        .statsPanel {
            background: rgba(10, 20, 30, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 40px;
            padding: 12px 20px;
            border: 1px solid rgba(255, 255, 255, 0.25);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            display: flex;
            gap: 28px;
            border-bottom: 3px solid #ffd966;
        }

        .statItem {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1.3rem;
            font-weight: 700;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .statIcon {
            font-size: 1.8rem;
            filter: drop-shadow(0 0 8px currentColor);
        }

        .coinStat { color: #ffd966; text-shadow: 0 0 15px #ffb347; }
        .shieldStat { color: #7ec8ff; text-shadow: 0 0 15px #3a86ff; }
        .magnetStat { color: #d0a2ff; text-shadow: 0 0 15px #9d4edd; }

        .scoreCard {
            background: linear-gradient(135deg, #1e2b3a, #0f1a24);
            border-radius: 40px;
            padding: 12px 30px;
            border: 2px solid #ffb347;
            box-shadow: 0 0 30px #ffb34760;
            font-size: 2rem;
            font-weight: 800;
            color: #ffd966;
            letter-spacing: 4px;
            text-shadow: 0 0 20px #ff9900;
            backdrop-filter: blur(8px);
        }

        .levelBadge {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(145deg, #3a0ca3, #480ca8);
            padding: 8px 25px;
            border-radius: 40px;
            font-size: 1.1rem;
            font-weight: 600;
            border: 2px solid #b5179e;
            box-shadow: 0 0 25px #b5179e;
            color: white;
            letter-spacing: 2px;
            backdrop-filter: blur(4px);
            white-space: nowrap;
            z-index: 15;
        }

        .powerupContainer {
            position: absolute;
            bottom: 120px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: center;
            pointer-events: none;
            z-index: 20;
        }

        .powerupActive {
            background: linear-gradient(145deg, #2a2a4a, #1a1a3a);
            border: 3px solid;
            border-radius: 60px;
            padding: 16px 40px;
            font-size: 1.6rem;
            font-weight: 800;
            backdrop-filter: blur(20px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            gap: 15px;
            transform: scale(1);
            animation: pulse 1.5s infinite;
        }

        .powerupActive.shield {
            border-color: #3a86ff;
            color: #a8d1ff;
            text-shadow: 0 0 30px #3a86ff;
        }

        .powerupActive.magnet {
            border-color: #9d4edd;
            color: #e0b3ff;
            text-shadow: 0 0 30px #9d4edd;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .controlsHint {
            position: absolute;
            bottom: 40px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 40px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            padding: 15px 25px;
            border-radius: 60px;
            width: fit-content;
            margin: 0 auto;
            left: 50%;
            transform: translateX(-50%);
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            pointer-events: auto;
            z-index: 25;
        }

        .hintItem {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #e2e8f0;
            font-size: 1rem;
            font-weight: 500;
            text-shadow: 1px 1px 2px black;
        }

        .hintIcon {
            background: rgba(255,255,255,0.15);
            border-radius: 50%;
            padding: 8px;
            font-size: 1.3rem;
        }

        #restartBtn {
            position: absolute;
            bottom: 180px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(145deg, #f72585, #b5179e);
            border: none;
            color: white;
            font-size: 1.6rem;
            font-weight: 800;
            padding: 20px 50px;
            border-radius: 80px;
            border: 3px solid #ffb3c6;
            box-shadow: 0 20px 40px #f7258560, 0 0 60px #b5179e;
            letter-spacing: 3px;
            z-index: 50;
            pointer-events: auto;
            cursor: pointer;
            transition: 0.2s;
            backdrop-filter: blur(10px);
        }

        #restartBtn:active {
            transform: translateX(-50%) scale(0.92);
            box-shadow: 0 10px 20px #f72585;
        }

        .hidden {
            display: none !important;
        }

        .distanceMarker {
            position: absolute;
            top: 100px;
            right: 20px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 1rem;
            color: #90e0ef;
            border: 1px solid #00b4d8;
            z-index: 15;
        }
    </style>
</head>
<body>
    <div id="gameWrapper">
        <canvas id="gameCanvas" width="450" height="900"></canvas>
        
        <div id="uiOverlay">
            <div class="levelBadge" id="levelDisplay">🌆 LEVEL 1</div>
            <div class="distanceMarker" id="distanceDisplay">🏁 0m</div>
            
            <div class="topBar">
                <div class="statsPanel">
                    <div class="statItem coinStat">
                        <span class="statIcon">🪙</span>
                        <span id="coinCount">0</span>
                    </div>
                    <div class="statItem shieldStat">
                        <span class="statIcon">🛡️</span>
                        <span id="shieldCount">0</span>
                    </div>
                    <div class="statItem magnetStat">
                        <span class="statIcon">🧲</span>
                        <span id="magnetCount">0</span>
                    </div>
                </div>
                <div class="scoreCard" id="scoreDisplay">0000</div>
            </div>

            <div class="powerupContainer" id="powerupContainer">
                <div id="activeShield" class="powerupActive shield hidden">
                    <span>🛡️</span> SHIELD ACTIVE <span>🛡️</span>
                </div>
                <div id="activeMagnet" class="powerupActive magnet hidden">
                    <span>🧲</span> MAGNET ACTIVE <span>🧲</span>
                </div>
            </div>

            <div class="controlsHint">
                <div class="hintItem"><span class="hintIcon">⬅️</span> SWIPE</div>
                <div class="hintItem"><span class="hintIcon">➡️</span> SWIPE</div>
                <div class="hintItem"><span class="hintIcon">⬆️</span> POWER</div>
            </div>
        </div>

        <button id="restartBtn" class="hidden">⟳ RESTART</button>
    </div>

    <script>
        (function() {
            // ==================== CANVAS SETUP ====================
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            
            function resizeCanvas() {
                const wrapper = document.getElementById('gameWrapper');
                canvas.width = wrapper.clientWidth;
                canvas.height = wrapper.clientHeight;
            }
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();

            // ==================== GAME CONSTANTS ====================
            const LANES = [0.2, 0.4, 0.6, 0.8]; // 4 lanes
            const BASE_SPEED = 0.012;
            const POWERUP_DURATION = 400; // frames
            
            // ==================== GAME STATE ====================
            let gameActive = true;
            let score = 0;
            let coins = 0;
            let shields = 0;
            let magnets = 0;
            let level = 1;
            let distance = 0;
            
            // Power-ups
            let activeShield = false;
            let activeMagnet = false;
            let shieldTimer = 0;
            let magnetTimer = 0;
            
            // Player
            let player = {
                lane: 1,
                jumpActive: false,
                jumpProgress: 0,
                color: '#4cc9f0'
            };
            
            // World objects
            let obstacles = [];
            let collectibles = [];
            let particles = [];
            
            // Game speed
            let gameSpeed = BASE_SPEED;
            let frame = 0;
            let lastSpawnFrame = 0;

            // ==================== UI ELEMENTS ====================
            const coinSpan = document.getElementById('coinCount');
            const shieldSpan = document.getElementById('shieldCount');
            const magnetSpan = document.getElementById('magnetCount');
            const scoreDiv = document.getElementById('scoreDisplay');
            const levelDiv = document.getElementById('levelDisplay');
            const distanceSpan = document.getElementById('distanceDisplay');
            const restartBtn = document.getElementById('restartBtn');
            const activeShieldDiv = document.getElementById('activeShield');
            const activeMagnetDiv = document.getElementById('activeMagnet');

            // ==================== UTILITY FUNCTIONS ====================
            function formatScore(scr) {
                return String(scr).padStart(4, '0').slice(0, 4);
            }

            function updateUI() {
                coinSpan.innerText = coins;
                shieldSpan.innerText = shields;
                magnetSpan.innerText = magnets;
                scoreDiv.innerText = formatScore(score);
                distanceSpan.innerText = `🏁 ${Math.floor(distance)}m`;
                
                // Level based on score
                let newLevel = 1 + Math.floor(score / 500);
                if (newLevel > 10) newLevel = 10;
                if (newLevel !== level) {
                    level = newLevel;
                    let levelEmoji = level <= 3 ? '🌆' : (level <= 6 ? '🌃' : '🌌');
                    levelDiv.innerHTML = `${levelEmoji} LEVEL ${level}`;
                }
                
                // Power-up UI
                if (activeShield) {
                    activeShieldDiv.classList.remove('hidden');
                    activeMagnetDiv.classList.add('hidden');
                } else if (activeMagnet) {
                    activeMagnetDiv.classList.remove('hidden');
                    activeShieldDiv.classList.add('hidden');
                } else {
                    activeShieldDiv.classList.add('hidden');
                    activeMagnetDiv.classList.add('hidden');
                }
            }

            // ==================== POWER-UP ACTIVATION ====================
            function activatePowerUp() {
                if (!gameActive) return;
                
                if (shields > 0 && !activeShield && !activeMagnet) {
                    shields--;
                    activeShield = true;
                    shieldTimer = POWERUP_DURATION;
                    createParticles('shield');
                } else if (magnets > 0 && !activeMagnet && !activeShield) {
                    magnets--;
                    activeMagnet = true;
                    magnetTimer = POWERUP_DURATION;
                    createParticles('magnet');
                }
                updateUI();
            }

            // ==================== PARTICLE EFFECTS ====================
            function createParticles(type) {
                for (let i = 0; i < 20; i++) {
                    particles.push({
                        x: 0.5,
                        y: 0.9,
                        vx: (Math.random() - 0.5) * 0.02,
                        vy: -Math.random() * 0.02 - 0.01,
                        life: 1.0,
                        type: type,
                        size: Math.random() * 0.03 + 0.02
                    });
                }
            }

            // ==================== SPAWN OBJECTS ====================
            function spawnObstacle() {
                if (!gameActive) return;
                
                let lane = Math.floor(Math.random() * 4);
                // Don't spawn directly on player
                if (lane === player.lane && Math.random() < 0.5) {
                    lane = (lane + 2) % 4;
                }
                
                obstacles.push({
                    x: LANES[lane],
                    y: -0.1,
                    width: 0.14,
                    height: 0.18,
                    type: 'train',
                    color: '#e63946',
                    variant: Math.floor(Math.random() * 3)
                });
            }

            function spawnCollectible() {
                if (!gameActive) return;
                
                let lane = Math.floor(Math.random() * 4);
                let type = Math.random();
                
                if (type < 0.6) { // Coin
                    collectibles.push({
                        x: LANES[lane],
                        y: -0.05,
                        width: 0.08,
                        height: 0.1,
                        type: 'coin',
                        value: 10,
                        glow: '#ffd966'
                    });
                } else if (type < 0.8) { // Shield
                    collectibles.push({
                        x: LANES[lane],
                        y: -0.05,
                        width: 0.1,
                        height: 0.12,
                        type: 'shield',
                        glow: '#3a86ff'
                    });
                } else { // Magnet
                    collectibles.push({
                        x: LANES[lane],
                        y: -0.05,
                        width: 0.1,
                        height: 0.12,
                        type: 'magnet',
                        glow: '#9d4edd'
                    });
                }
            }

            // ==================== GAME UPDATE ====================
            function updateGame() {
                if (!gameActive) return;

                // Update speed based on score
                gameSpeed = BASE_SPEED + (Math.floor(score / 300) * 0.003);
                if (gameSpeed > 0.035) gameSpeed = 0.035;

                // Update distance
                distance += gameSpeed * 100;

                // Spawn objects
                if (frame % Math.max(35, 45 - level * 2) === 0) {
                    spawnObstacle();
                }
                if (frame % 20 === 0) {
                    spawnCollectible();
                }

                // Move obstacles
                for (let i = obstacles.length - 1; i >= 0; i--) {
                    obstacles[i].y += gameSpeed;
                    if (obstacles[i].y > 1.2) {
                        obstacles.splice(i, 1);
                    }
                }

                // Move collectibles
                for (let i = collectibles.length - 1; i >= 0; i--) {
                    let c = collectibles[i];
                    
                    // Magnet effect
                    if (activeMagnet && c.type === 'coin') {
                        let targetX = LANES[player.lane];
                        let dx = targetX - c.x;
                        let dy = (0.9 - c.y);
                        c.x += dx * 0.03;
                        c.y += dy * 0.02;
                    }
                    
                    c.y += gameSpeed;
                    
                    if (c.y > 1.2) {
                        collectibles.splice(i, 1);
                    }
                }

                // Update particles
                for (let i = particles.length - 1; i >= 0; i--) {
                    let p = particles[i];
                    p.x += p.vx;
                    p.y += p.vy;
                    p.life -= 0.02;
                    if (p.life <= 0 || p.y < 0) {
                        particles.splice(i, 1);
                    }
                }

                // COLLISION DETECTION
                let playerLeft = LANES[player.lane] - 0.1;
                let playerRight = LANES[player.lane] + 0.1;
                let playerTop = 0.8;
                let playerBottom = 0.98;

                // Collectibles collision
                for (let i = collectibles.length - 1; i >= 0; i--) {
                    let c = collectibles[i];
                    let cLeft = c.x - c.width/2;
                    let cRight = c.x + c.width/2;
                    let cTop = c.y - c.height/2;
                    let cBottom = c.y + c.height/2;

                    if (playerLeft < cRight && playerRight > cLeft && 
                        playerTop < cBottom && playerBottom > cTop) {
                        
                        if (c.type === 'coin') {
                            coins++;
                            score += 10;
                            createParticles('coin');
                        } else if (c.type === 'shield') {
                            shields++;
                            score += 25;
                            createParticles('shield');
                        } else if (c.type === 'magnet') {
                            magnets++;
                            score += 25;
                            createParticles('magnet');
                        }
                        
                        collectibles.splice(i, 1);
                    }
                }

                // Obstacle collision
                for (let i = obstacles.length - 1; i >= 0; i--) {
                    let obs = obstacles[i];
                    let oLeft = obs.x - obs.width/2;
                    let oRight = obs.x + obs.width/2;
                    let oTop = obs.y - obs.height/2;
                    let oBottom = obs.y + obs.height/2;

                    if (playerLeft < oRight && playerRight > oLeft && 
                        playerTop < oBottom && playerBottom > oTop) {
                        
                        if (activeShield) {
                            // Shield protects
                            activeShield = false;
                            shieldTimer = 0;
                            obstacles.splice(i, 1);
                            createParticles('shield_break');
                        } else {
                            gameActive = false;
                            restartBtn.classList.remove('hidden');
                            break;
                        }
                    }
                }

                // Power-up timers
                if (activeShield) {
                    shieldTimer--;
                    if (shieldTimer <= 0) activeShield = false;
                }
                if (activeMagnet) {
                    magnetTimer--;
                    if (magnetTimer <= 0) activeMagnet = false;
                }

                // Increase score over time
                if (frame % 5 === 0) score += 1;

                frame++;
                updateUI();
            }

            // ==================== RENDERING ====================
            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                // ===== BACKGROUND (4K Realistic) =====
                // Sky gradient
                let gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
                gradient.addColorStop(0, '#0b1120');
                gradient.addColorStop(0.4, '#1a2639');
                gradient.addColorStop(0.7, '#2d374b');
                gradient.addColorStop(1, '#3a4a5e');
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // Stars
                ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
                for (let i = 0; i < 50; i++) {
                    let x = (i * 37) % canvas.width;
                    let y = (i * 23) % (canvas.height * 0.6);
                    ctx.globalAlpha = 0.3 + Math.sin(i + frame * 0.02) * 0.2;
                    ctx.beginPath();
                    ctx.arc(x, y, 1 + i % 3, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.globalAlpha = 1;

                // City skyline
                ctx.shadowColor = '#4a90e2';
                ctx.shadowBlur = 20;
                ctx.fillStyle = '#1e2b3c';
                for (let i = 0; i < 12; i++) {
                    let height = 50 + Math.sin(i) * 30;
                    ctx.fillRect(i * 60, canvas.height - 120 - height, 40, height);
                }

                // ===== SUBWAY TUNNEL =====
                ctx.shadowBlur = 0;
                
                // Rails (perspective)
                ctx.lineWidth = 3;
                for (let i = 0; i < 5; i++) {
                    let x = (canvas.width / 5) * i;
                    ctx.beginPath();
                    ctx.moveTo(x, 0);
                    ctx.lineTo(x - 80, canvas.height);
                    ctx.strokeStyle = `rgba(100, 150, 200, ${0.2 + i * 0.05})`;
                    ctx.stroke();
                }

                // Lane markers
                for (let i = 0; i < LANES.length; i++) {
                    let x = LANES[i] * canvas.width;
                    
                    // Lane glow
                    ctx.shadowColor = '#3a86ff';
                    ctx.shadowBlur = 20;
                    ctx.beginPath();
                    ctx.moveTo(x - 5, 0);
                    ctx.lineTo(x - 15, canvas.height);
                    ctx.strokeStyle = 'rgba(100, 200, 255, 0.15)';
                    ctx.lineWidth = 15;
                    ctx.stroke();
                    
                    // Sleeper beams
                    ctx.shadowBlur = 5;
                    ctx.fillStyle = 'rgba(80, 60, 40, 0.6)';
                    for (let s = 0; s < 10; s++) {
                        let y = (s * 150 + frame * 5) % canvas.height;
                        ctx.fillRect(x - 25, y - 5, 50, 6);
                    }
                }
                ctx.shadowBlur = 0;

                // ===== COLLECTIBLES =====
                for (let c of collectibles) {
                    let x = c.x * canvas.width;
                    let y = c.y * canvas.height;
                    let w = c.width * canvas.width;
                    let h = c.height * canvas.height;

                    ctx.shadowColor = c.glow;
                    ctx.shadowBlur = 30;

                    if (c.type === 'coin') {
                        // 3D Coin
                        ctx.beginPath();
                        ctx.ellipse(x, y, w/2, h/2, 0, 0, Math.PI * 2);
                        
                        // Gradient for coin
                        let coinGrad = ctx.createRadialGradient(x-5, y-5, 5, x, y, w);
                        coinGrad.addColorStop(0, '#ffd966');
                        coinGrad.addColorStop(0.7, '#ffb347');
                        coinGrad.addColorStop(1, '#b7791f');
                        ctx.fillStyle = coinGrad;
                        ctx.fill();
                        
                        // Highlight
                        ctx.shadowBlur = 40;
                        ctx.beginPath();
                        ctx.ellipse(x-3, y-3, w/4, h/4, 0, 0, Math.PI * 2);
                        ctx.fillStyle = '#fff9e6';
                        ctx.globalAlpha = 0.4;
                        ctx.fill();
                        ctx.globalAlpha = 1;
                    } else {
                        // Power-up cards
                        let grad = ctx.createLinearGradient(x-w/2, y-h/2, x+w/2, y+h/2);
                        if (c.type === 'shield') {
                            grad.addColorStop(0, '#3a86ff');
                            grad.addColorStop(1, '#1a4d8c');
                        } else {
                            grad.addColorStop(0, '#9d4edd');
                            grad.addColorStop(1, '#5a1e8c');
                        }
                        
                        ctx.fillStyle = grad;
                        ctx.beginPath();
                        ctx.roundRect(x - w/2, y - h/2, w, h, 15);
                        ctx.fill();
                        
                        // Icon
                        ctx.font = `${h * 0.6}px 'Segoe UI'`;
                        ctx.fillStyle = 'white';
                        ctx.shadowBlur = 30;
                        ctx.fillText(c.type === 'shield' ? '🛡️' : '🧲', x - w/4, y + h/4);
                    }
                }

                // ===== OBSTACLES (Trains) =====
                for (let obs of obstacles) {
                    let x = obs.x * canvas.width;
                    let y = obs.y * canvas.height;
                    let w = obs.width * canvas.width;
                    let h = obs.height * canvas.height;

                    // Train body
                    ctx.shadowColor = '#e63946';
                    ctx.shadowBlur = 40;
                    
                    let grad = ctx.createLinearGradient(x-w/2, y-h/2, x+w/2, y+h/2);
                    grad.addColorStop(0, '#e63946');
                    grad.addColorStop(0.6, '#9d0208');
                    grad.addColorStop(1, '#6a040f');
                    ctx.fillStyle = grad;
                    ctx.beginPath();
                    ctx.roundRect(x - w/2, y - h/2, w, h, 12);
                    ctx.fill();

                    // Windows
                    ctx.shadowBlur = 15;
                    ctx.fillStyle = '#ffc8dd';
                    ctx.fillRect(x - w/3, y - h/4, w/6, h/5);
                    ctx.fillRect(x + w/6, y - h/4, w/6, h/5);
                    
                    // Lights
                    ctx.shadowColor = '#ffd700';
                    ctx.shadowBlur = 25;
                    ctx.fillStyle = '#ffff99';
                    ctx.beginPath();
                    ctx.arc(x - w/4, y + h/5, w/12, 0, Math.PI * 2);
                    ctx.arc(x + w/4, y + h/5, w/12, 0, Math.PI * 2);
                    ctx.fill();
                }

                // ===== PLAYER (Stylish Runner) =====
                let px = LANES[player.lane] * canvas.width;
                let py = canvas.height * 0.9;

                // Player glow
                ctx.shadowColor = activeShield ? '#3a86ff' : (activeMagnet ? '#9d4edd' : '#4cc9f0');
                ctx.shadowBlur = activeShield ? 70 : (activeMagnet ? 70 : 40);

                // Body
                let bodyGrad = ctx.createRadialGradient(px-15, py-20, 10, px, py, 50);
                bodyGrad.addColorStop(0, '#f8f9fa');
                bodyGrad.addColorStop(0.5, '#4cc9f0');
                bodyGrad.addColorStop(1, '#3a0ca3');
                
                ctx.fillStyle = bodyGrad;
                ctx.beginPath();
                ctx.ellipse(px, py - 25, 22, 30, 0, 0, Math.PI * 2);
                ctx.fill();

                // Head
                ctx.fillStyle = '#ffe5c4';
                ctx.shadowBlur = 30;
                ctx.beginPath();
                ctx.arc(px, py - 55, 20, 0, Math.PI * 2);
                ctx.fill();

                // Cap
                ctx.fillStyle = '#c1121f';
                ctx.beginPath();
                ctx.ellipse(px, py - 70, 22, 10, 0, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = '#f8f9fa';
                ctx.beginPath();
                ctx.arc(px, py - 75, 8, 0, Math.PI, true);
                ctx.fill();

                // Backpack
                ctx.fillStyle = '#1e3c5c';
                ctx.fillRect(px - 15, py - 45, 30, 25);

                // Power-up auras
                if (activeShield) {
                    ctx.shadowColor = '#3a86ff';
                    ctx.shadowBlur = 80;
                    ctx.strokeStyle = '#7ec8ff';
                    ctx.lineWidth = 6;
                    ctx.beginPath();
                    ctx.arc(px, py - 40, 60, 0, Math.PI * 2);
                    ctx.stroke();
                }

                if (activeMagnet) {
                    ctx.shadowColor = '#9d4edd';
                    ctx.shadowBlur = 80;
                    ctx.strokeStyle = '#e0b3ff';
                    ctx.lineWidth = 6;
                    ctx.beginPath();
                    ctx.arc(px, py - 40, 60, 0, Math.PI * 2);
                    ctx.stroke();
                }

                // ===== PARTICLES =====
                for (let p of particles) {
                    ctx.globalAlpha = p.life;
                    ctx.shadowBlur = 20;
                    ctx.shadowColor = p.type === 'shield' ? '#3a86ff' : (p.type === 'magnet' ? '#9d4edd' : '#ffd966');
                    ctx.fillStyle = p.type === 'shield' ? '#7ec8ff' : (p.type === 'magnet' ? '#d0a2ff' : '#ffd966');
                    ctx.beginPath();
                    ctx.arc(p.x * canvas.width, p.y * canvas.height, p.size * canvas.width, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.globalAlpha = 1;
                ctx.shadowBlur = 0;

                requestAnimationFrame(draw);
            }

            // ==================== TOUCH CONTROLS ====================
            let touchStartX = 0, touchStartY = 0;
            let touchMoved = false;
            const SWIPE_THRESHOLD = 20;

            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                const touch = e.touches[0];
                touchStartX = touch.clientX;
                touchStartY = touch.clientY;
                touchMoved = false;
            }, { passive: false });

            canvas.addEventListener('touchmove', (e) => {
                e.preventDefault();
                if (!gameActive) return;
                
                const touch = e.touches[0];
                let dx = touch.clientX - touchStartX;
                let dy = touch.clientY - touchStartY;

                if (Math.abs(dx) > SWIPE_THRESHOLD && !touchMoved) {
                    if (dx > 0 && player.lane < 3) {
                        player.lane++;
                    } else if (dx < 0 && player.lane > 0) {
                        player.lane--;
                    }
                    touchMoved = true;
                    touchStartX = touch.clientX;
                }

                if (Math.abs(dy) > SWIPE_THRESHOLD && !touchMoved) {
                    if (dy < -30) { // Swipe up
                        activatePowerUp();
                    }
                    touchMoved = true;
                    touchStartY = touch.clientY;
                }
            }, { passive: false });

            canvas.addEventListener('touchend', (e) => e.preventDefault());

            // Keyboard fallback
            window.addEventListener('keydown', (e) => {
                if (!gameActive) return;
                if (e.key === 'ArrowLeft' && player.lane > 0) player.lane--;
                if (e.key === 'ArrowRight' && player.lane < 3) player.lane++;
                if (e.key === 'ArrowUp') activatePowerUp();
            });

            // Restart
            restartBtn.addEventListener('click', () => {
                gameActive = true;
                score = 0;
                coins = 0;
                shields = 0;
                magnets = 0;
                distance = 0;
                obstacles = [];
                collectibles = [];
                particles = [];
                player.lane = 1;
                activeShield = false;
                activeMagnet = false;
                shieldTimer = 0;
                magnetTimer = 0;
                gameSpeed = BASE_SPEED;
                frame = 0;
                restartBtn.classList.add('hidden');
                updateUI();
            });

            // ==================== START GAME ====================
            setInterval(() => {
                updateGame();
            }, 16); // ~60fps

            draw();
            updateUI();

            // Helper function for rounded rect
            CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
                if (w < 2 * r) r = w / 2;
                if (h < 2 * r) r = h / 2;
                this.moveTo(x + r, y);
                this.lineTo(x + w - r, y);
                this.quadraticCurveTo(x + w, y, x + w, y + r);
                this.lineTo(x + w, y + h - r);
                this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
                this.lineTo(x + r, y + h);
                this.quadraticCurveTo(x, y + h, x, y + h - r);
                this.lineTo(x, y + r);
                this.quadraticCurveTo(x, y, x + r, y);
                this.closePath();
                return this;
            };
        })();
    </script>
</body>
